services:
  database:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=education_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@database:5432/education_crm?schema=public
      - JWT_SECRET=your-secret-key
    ports:
      - "3001:3001"
    depends_on:
      - database

  bot:
    build: ./bot
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@database:5432/education_crm?schema=public
    depends_on:
      - database

volumes:
  postgres_data:
